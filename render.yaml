services:
  - type: web
    name: taskflow
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: taskflow-backups
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: taskflow
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_MAX_AGE_DAYS
        value: 30
      - key: APP_NAME
        value: TaskFlow
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.9
      # תיקיית גיבויים על ה-disk המתמיד
      - key: BACKUP_DIR
        value: /var/data/backups
      - key: BACKUP_ENABLED
        value: true
      - key: BACKUP_RETENTION_DAYS
        value: 7
      - key: BACKUP_HOUR
        value: 3
      - key: BACKUP_MINUTE
        value: 0
