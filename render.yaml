services:
  - type: web
    name: taskflow
    runtime: python
    plan: starter
    # מתקין mongodb-database-tools (mongodump/mongorestore) דרך הורדת tarball
    # הכלים זמינים בתיקיית /opt/render/project/.render/mongodb-tools/bin
    # שימוש ב-mktemp ובלי cd כדי לא לשבור את ה-pwd לפני pip install
    buildCommand: |
      set -e
      MONGO_TOOLS_DIR="/opt/render/project/.render/mongodb-tools"
      if [ ! -x "$MONGO_TOOLS_DIR/bin/mongodump" ]; then
        mkdir -p "$MONGO_TOOLS_DIR/bin"
        TMP="$(mktemp -d)"
        curl -fsSL -o "$TMP/mongo-tools.tgz" \
          https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.10.0.tgz
        tar -xzf "$TMP/mongo-tools.tgz" -C "$TMP"
        cp "$TMP"/mongodb-database-tools-*/bin/* "$MONGO_TOOLS_DIR/bin/"
        rm -rf "$TMP"
      fi
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: taskflow-backups
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: taskflow
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_MAX_AGE_DAYS
        value: 30
      - key: APP_NAME
        value: TaskFlow
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.9
      # נתיב לכלי mongodump שהורדו ב-build (משמש את גיבוי המסד)
      - key: MONGODUMP_PATH
        value: /opt/render/project/.render/mongodb-tools/bin/mongodump
      # תיקיית גיבויים על ה-disk המתמיד
      - key: BACKUP_DIR
        value: /var/data/backups
      - key: BACKUP_ENABLED
        value: true
      - key: BACKUP_RETENTION_DAYS
        value: 7
      - key: BACKUP_HOUR
        value: 3
      - key: BACKUP_MINUTE
        value: 0
