<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f8fafc" id="meta-theme-color">
    <title>{% block title %}TaskFlow{% endblock %}</title>

    <!-- מצב כהה: החלת ה-class על <html> לפני הצביעה כדי למנוע הבזק (FOUC) -->
    <script>
        (function() {
            try {
                var stored = localStorage.getItem('theme');
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                var isDark = stored ? stored === 'dark' : prefersDark;
                if (isDark) {
                    document.documentElement.classList.add('dark');
                }
            } catch (e) {}
        })();
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Heebo Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/main.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Heebo', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>

    {% block head %}{% endblock %}
</head>
<body class="font-sans bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen pb-20 md:pb-0 transition-colors duration-200">
    {% if request.url.path != '/login' %}
    <!-- ניווט עליון - טאבלט/דסקטופ -->
    <nav class="hidden md:block bg-white dark:bg-slate-900 shadow-sm border-b border-slate-200 dark:border-slate-800 sticky top-0 z-20 transition-colors duration-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- לוגו -->
                <a href="/" class="flex items-center">
                    <div class="w-9 h-9 bg-primary-600 rounded-lg flex items-center justify-center ml-3 shadow-sm dark:shadow-[0_0_18px_-4px_rgba(59,130,246,0.55)]">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                    </div>
                    <h1 class="text-xl font-bold text-slate-900 dark:text-slate-100">TaskFlow</h1>
                </a>

                <!-- קישורי ניווט -->
                <div class="flex items-center gap-1">
                    <a href="/" class="nav-link {% if current_page == 'dashboard' %}nav-link-active{% endif %}">
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                        דשבורד
                    </a>
                    <a href="/clients" class="nav-link {% if current_page == 'clients' %}nav-link-active{% endif %}">
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        לקוחות
                    </a>
                    <a href="/projects" class="nav-link {% if current_page == 'projects' %}nav-link-active{% endif %}">
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                        </svg>
                        פרויקטים
                    </a>
                    <a href="/tasks" class="nav-link {% if current_page == 'tasks' %}nav-link-active{% endif %}">
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        משימות
                    </a>
                    <a href="/tags" class="nav-link {% if current_page == 'tags' %}nav-link-active{% endif %}">
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                        </svg>
                        תגיות
                    </a>
                    <a href="/admin/backups" class="nav-link {% if current_page == 'backups' %}nav-link-active{% endif %}" title="גיבויים">
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
                        </svg>
                        גיבויים
                    </a>
                </div>

                <!-- טוגל מצב כהה + התנתקות -->
                <div class="flex items-center gap-2">
                    <button type="button"
                            onclick="window.toggleTheme && window.toggleTheme()"
                            class="theme-toggle"
                            aria-label="החלף מצב כהה/בהיר"
                            title="החלף מצב כהה/בהיר">
                        <!-- שמש (מוצגת במצב כהה - לחיצה תחזיר לבהיר) -->
                        <svg class="theme-toggle-icon theme-toggle-sun w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364-6.364l-1.414 1.414M6.05 17.95l-1.414 1.414m0-13.728l1.414 1.414M17.95 17.95l1.414 1.414M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <!-- ירח (מוצג במצב בהיר - לחיצה תעבור לכהה) -->
                        <svg class="theme-toggle-icon theme-toggle-moon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                    <form method="POST" action="/logout">
                        <button type="submit" class="text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-sm font-medium">
                            התנתק
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- ניווט תחתון - נייד -->
    <nav class="md:hidden fixed bottom-0 right-0 left-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 z-20 shadow-lg transition-colors duration-200">
        <div class="grid grid-cols-5 gap-1 px-1 py-2">
            <a href="/" class="bottom-nav-link {% if current_page == 'dashboard' %}bottom-nav-active{% endif %}">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span class="text-xs">דשבורד</span>
            </a>
            <a href="/clients" class="bottom-nav-link {% if current_page == 'clients' %}bottom-nav-active{% endif %}">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <span class="text-xs">לקוחות</span>
            </a>
            <a href="/projects" class="bottom-nav-link {% if current_page == 'projects' %}bottom-nav-active{% endif %}">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                </svg>
                <span class="text-xs">פרויקטים</span>
            </a>
            <a href="/tasks" class="bottom-nav-link {% if current_page == 'tasks' %}bottom-nav-active{% endif %}">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
                <span class="text-xs">משימות</span>
            </a>
            <a href="/tags" class="bottom-nav-link {% if current_page == 'tags' %}bottom-nav-active{% endif %}">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                </svg>
                <span class="text-xs">תגיות</span>
            </a>
        </div>
    </nav>

    <!-- כותרת מובייל -->
    <header class="md:hidden bg-white dark:bg-slate-900 shadow-sm border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10 transition-colors duration-200">
        <div class="flex justify-between items-center h-14 px-4">
            <a href="/" class="flex items-center">
                <div class="w-7 h-7 bg-primary-600 rounded-lg flex items-center justify-center ml-2 dark:shadow-[0_0_14px_-3px_rgba(59,130,246,0.55)]">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                </div>
                <h1 class="text-lg font-bold text-slate-900 dark:text-slate-100">TaskFlow</h1>
            </a>
            <div class="flex items-center gap-1">
                <button type="button"
                        onclick="window.toggleTheme && window.toggleTheme()"
                        class="theme-toggle theme-toggle-sm"
                        aria-label="החלף מצב כהה/בהיר"
                        title="החלף מצב כהה/בהיר">
                    <svg class="theme-toggle-icon theme-toggle-sun w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364-6.364l-1.414 1.414M6.05 17.95l-1.414 1.414m0-13.728l1.414 1.414M17.95 17.95l1.414 1.414M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <svg class="theme-toggle-icon theme-toggle-moon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>
                <a href="/admin/backups"
                   class="text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-800"
                   title="גיבויים">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
                    </svg>
                </a>
                <form method="POST" action="/logout">
                    <button type="submit" class="text-slate-600 dark:text-slate-300 px-2 py-1 rounded text-sm">
                        התנתק
                    </button>
                </form>
            </div>
        </div>
    </header>
    {% else %}
    <!-- טוגל צף בעמוד התחברות -->
    <button type="button"
            onclick="window.toggleTheme && window.toggleTheme()"
            class="theme-toggle theme-toggle-floating"
            aria-label="החלף מצב כהה/בהיר"
            title="החלף מצב כהה/בהיר">
        <svg class="theme-toggle-icon theme-toggle-sun w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364-6.364l-1.414 1.414M6.05 17.95l-1.414 1.414m0-13.728l1.414 1.414M17.95 17.95l1.414 1.414M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg class="theme-toggle-icon theme-toggle-moon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
    </button>
    {% endif %}

    {% block body %}{% endblock %}

    <!-- ניהול מצב כהה: שמירה ב-localStorage + עדכון theme-color + dispatch -->
    <script>
        (function() {
            function applyTheme(theme) {
                var root = document.documentElement;
                if (theme === 'dark') {
                    root.classList.add('dark');
                } else {
                    root.classList.remove('dark');
                }
                var meta = document.getElementById('meta-theme-color');
                if (meta) {
                    meta.setAttribute('content', theme === 'dark' ? '#020617' : '#f8fafc');
                }
                try { localStorage.setItem('theme', theme); } catch (e) {}
                window.dispatchEvent(new CustomEvent('theme-changed', { detail: { theme: theme } }));
            }

            window.toggleTheme = function() {
                var isDark = document.documentElement.classList.contains('dark');
                applyTheme(isDark ? 'light' : 'dark');
            };

            // סנכרון theme-color בטעינה (אם הסקריפט המוקדם הפעיל dark)
            var initial = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            var meta = document.getElementById('meta-theme-color');
            if (meta) meta.setAttribute('content', initial === 'dark' ? '#020617' : '#f8fafc');

            // האזנה לשינוי במערכת רק כשהמשתמש לא בחר ידנית
            try {
                var mq = window.matchMedia('(prefers-color-scheme: dark)');
                mq.addEventListener && mq.addEventListener('change', function(e) {
                    if (!localStorage.getItem('theme')) {
                        applyTheme(e.matches ? 'dark' : 'light');
                    }
                });
            } catch (e) {}
        })();
    </script>
</body>
</html>
