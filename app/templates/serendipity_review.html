{% extends "base.html" %}

{% block title %}סקירת משימות - TaskFlow{% endblock %}

{% block body %}
<main x-data="serendipityReview()" x-init="loadNext()"
      class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10 fade-in">

    <!-- כותרת -->
    <div class="mb-6 md:mb-8 text-center">
        <h2 class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-sf-text-primary">סקירת משימות</h2>
        <p class="text-slate-600 dark:text-sf-text-secondary mt-1 text-sm md:text-base">משימה אחת בכל פעם — עדכנו סטטוס במהירות</p>
    </div>

    <!-- טעינה -->
    <div x-show="loading" class="flex flex-col items-center justify-center py-24 text-slate-500 dark:text-sf-text-secondary">
        <svg class="animate-spin w-8 h-8 mb-3" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span class="text-sm">טוען…</span>
    </div>

    <!-- שגיאה -->
    <template x-if="!loading && error">
        <div class="text-center py-20">
            <div class="text-4xl mb-4">😕</div>
            <h3 class="text-lg font-semibold text-slate-900 dark:text-sf-text-primary mb-2">משהו השתבש</h3>
            <p class="text-slate-600 dark:text-sf-text-secondary text-sm mb-6">לא הצלחנו לטעון משימה לסקירה.</p>
            <button @click="loadNext()" class="btn btn-primary">נסו שוב</button>
        </div>
    </template>

    <!-- כרטיס משימה -->
    <template x-if="!loading && !error && task">
        <div>
            <div class="review-card relative overflow-hidden rounded-2xl shadow-lg border border-slate-200 dark:border-sf-border p-7 md:p-10 min-h-[240px] flex flex-col justify-center">
                <!-- רקע דקורטיבי ב-CSS בלבד (גרדיאנט) - ללא תמונות חיצוניות -->
                <div class="review-card-bg" aria-hidden="true"></div>

                <div class="relative z-10">
                    <!-- שורה עליונה: סטטוס נוכחי + באדג תזכורת -->
                    <div class="mb-3 flex items-center justify-between gap-2 flex-wrap">
                        <!-- הסטטוס הנוכחי של המשימה (פתוח/בתהליך) -->
                        <span class="review-status-badge" :class="'review-status-' + task.status">
                            <span class="review-status-dot" aria-hidden="true"></span>
                            <span x-text="statusLabel(task.status)"></span>
                        </span>
                        <!-- באדג תזכורת: מציג מועד אם קיים, אחרת "צור תזכורת" -->
                        <button type="button" @click="openReminder()"
                                class="reminder-badge" :class="task.reminder_date ? 'reminder-badge-active' : ''"
                                :title="task.reminder_date ? 'שינוי/הסרת תזכורת' : 'צור תזכורת'">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                            </svg>
                            <span x-text="task.reminder_date ? ('תזכורת: ' + formatReminder(task.reminder_date)) : 'צור תזכורת'"></span>
                        </button>
                    </div>
                    <h3 class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-white mb-4 break-words" x-text="task.title"></h3>

                    <!-- תיאור: רינדור Markdown מהשרת, fallback ל-plaintext למשימות ישנות.
                         אם אין תיאור כלל - שום בלוק לא מוצג (רק הכותרת). -->
                    <div
                        x-show="task.description_html"
                        class="markdown-body text-sm md:text-base leading-relaxed text-slate-700 dark:text-slate-100"
                        x-html="task.description_html"
                    ></div>
                    <p
                        x-show="!task.description_html && task.description"
                        class="whitespace-pre-wrap text-sm md:text-base leading-relaxed text-slate-700 dark:text-slate-100"
                        x-text="task.description"
                    ></p>
                </div>
            </div>

            <!-- שלושת כפתורי הבחירה: פתוח / בתהליך / הושלם -->
            <div class="grid grid-cols-3 gap-3 mt-6">
                <button @click="choose('open')" :disabled="submitting"
                        class="review-choice review-choice-open">
                    <svg class="w-6 h-6 mb-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="9" stroke-width="2"/>
                    </svg>
                    <span>פתוח</span>
                </button>
                <button @click="choose('in_progress')" :disabled="submitting"
                        class="review-choice review-choice-progress">
                    <svg class="w-6 h-6 mb-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span>בתהליך</span>
                </button>
                <button @click="choose('completed')" :disabled="submitting"
                        class="review-choice review-choice-done">
                    <svg class="w-6 h-6 mb-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span>הושלם</span>
                </button>
            </div>
        </div>
    </template>

    <!-- מצב ריק: אין משימות זמינות לסקירה -->
    <template x-if="!loading && !error && !task">
        <div class="text-center py-20">
            <div class="text-5xl mb-4">🌤️</div>
            <h3 class="text-xl font-semibold text-slate-900 dark:text-sf-text-primary mb-2">אין מה לסקור כרגע</h3>
            <p class="text-slate-600 dark:text-sf-text-secondary text-sm mb-6">כל המשימות מעודכנות. אפשר לחזור מאוחר יותר.</p>
            <a href="/" class="btn btn-secondary inline-block">חזרה לדשבורד</a>
        </div>
    </template>

    <!-- מודאל תזכורת: בחירת מועד (datetime-local), שמירה דרך PUT /api/tasks/{id} -->
    <div x-show="reminderOpen" x-cloak
         class="fixed inset-0 z-50 flex items-center justify-center p-4"
         @keydown.escape.window="closeReminder()">
        <div class="absolute inset-0 bg-black/40" @click="closeReminder()"></div>
        <div class="relative bg-white dark:bg-sf-bg-card rounded-2xl shadow-xl border border-slate-200 dark:border-sf-border w-full max-w-sm p-6">
            <h3 class="text-lg font-bold text-slate-900 dark:text-sf-text-primary mb-1">תזכורת</h3>
            <p class="text-xs text-slate-500 dark:text-sf-text-secondary mb-4">תישלח התראה בטלגרם במועד שתבחרו.</p>

            <label class="form-label">מועד התזכורת</label>
            <input type="datetime-local" x-model="reminderValue" class="form-input" :disabled="reminderSaving">

            <p x-show="reminderError" x-cloak class="text-sm text-red-600 dark:text-sf-red mt-2" x-text="reminderError"></p>

            <div class="flex items-center justify-between gap-2 mt-5">
                <!-- הסר תזכורת - רק כשקיימת -->
                <button type="button" x-show="task && task.reminder_date" x-cloak
                        @click="clearReminder()" :disabled="reminderSaving"
                        class="text-sm text-red-600 dark:text-sf-red hover:underline disabled:opacity-50">
                    הסר תזכורת
                </button>
                <span x-show="!(task && task.reminder_date)" aria-hidden="true"></span>

                <div class="flex items-center gap-2">
                    <button type="button" @click="closeReminder()" :disabled="reminderSaving" class="btn btn-secondary">ביטול</button>
                    <button type="button" @click="saveReminder()" :disabled="reminderSaving || !reminderValue" class="btn btn-primary">
                        <span x-show="!reminderSaving">שמירה</span>
                        <span x-show="reminderSaving" x-cloak>שומר…</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

</main>

<style>
    [x-cloak] { display: none !important; }

    /* רקע דקורטיבי לכרטיס - גרדיאנט CSS בלבד (אין תמונות) */
    .review-card-bg {
        position: absolute;
        inset: 0;
        background:
            radial-gradient(circle at 18% 22%, rgba(124, 91, 245, 0.18), transparent 42%),
            radial-gradient(circle at 82% 80%, rgba(45, 212, 191, 0.16), transparent 45%),
            linear-gradient(135deg, #eef2ff 0%, #faf5ff 55%, #eff6ff 100%);
    }
    html.dark .review-card-bg {
        background:
            radial-gradient(circle at 18% 22%, rgba(124, 91, 245, 0.32), transparent 45%),
            radial-gradient(circle at 82% 80%, rgba(45, 212, 191, 0.18), transparent 48%),
            linear-gradient(135deg, #1a1e38 0%, #1e2240 55%, #161a30 100%);
    }

    /* תווית הסטטוס הנוכחי */
    .review-status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.2rem 0.7rem;
        border-radius: 9999px;
        font-size: 0.78rem;
        font-weight: 600;
        border: 1px solid transparent;
    }
    .review-status-dot { width: 0.5rem; height: 0.5rem; border-radius: 9999px; background: currentColor; }
    .review-status-open        { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .review-status-in_progress { background: #fffbeb; color: #b45309; border-color: #fde68a; }
    .review-status-completed   { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
    html.dark .review-status-open        { background: rgba(59, 130, 246, 0.15); color: #93c5fd; border-color: rgba(59, 130, 246, 0.35); }
    html.dark .review-status-in_progress { background: rgba(212, 160, 32, 0.15); color: #fcd34d; border-color: rgba(212, 160, 32, 0.35); }
    html.dark .review-status-completed   { background: rgba(52, 211, 153, 0.15); color: #6ee7b7; border-color: rgba(52, 211, 153, 0.35); }

    /* באדג תזכורת */
    .reminder-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.2rem 0.7rem;
        border-radius: 9999px;
        font-size: 0.78rem;
        font-weight: 600;
        cursor: pointer;
        background: #ffffff;
        color: #475569;
        border: 1px solid #e2e8f0;
        transition: background-color 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }
    .reminder-badge:hover { border-color: #7c5bf5; color: #6b4ae0; background: #f5f3ff; }
    .reminder-badge-active { background: #f5f3ff; color: #6b4ae0; border-color: #ddd6fe; }
    html.dark .reminder-badge { background: #1a1e38; color: #8b90a8; border-color: rgba(255, 255, 255, 0.10); }
    html.dark .reminder-badge:hover { border-color: #7c5bf5; color: #9b7ffc; background: rgba(124, 91, 245, 0.12); }
    html.dark .reminder-badge-active { background: rgba(124, 91, 245, 0.15); color: #9b7ffc; border-color: rgba(124, 91, 245, 0.35); }

    /* כפתורי הבחירה */
    .review-choice {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0.9rem 0.5rem;
        border-radius: 0.85rem;
        border: 2px solid var(--border, #e2e8f0);
        background: #ffffff;
        color: #334155;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: transform 0.12s ease, border-color 0.12s ease, background-color 0.12s ease, box-shadow 0.12s ease;
    }
    html.dark .review-choice {
        background: #1a1e38;
        color: #c4dcff;
        border-color: rgba(255, 255, 255, 0.10);
    }
    .review-choice:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08); }
    .review-choice:active:not(:disabled) { transform: translateY(0); }
    .review-choice:disabled { opacity: 0.5; cursor: not-allowed; }

    .review-choice-open:hover:not(:disabled)     { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
    .review-choice-progress:hover:not(:disabled) { border-color: #f59e0b; background: #fffbeb; color: #b45309; }
    .review-choice-done:hover:not(:disabled)     { border-color: #34d399; background: #ecfdf5; color: #047857; }
    html.dark .review-choice-open:hover:not(:disabled)     { border-color: #3b82f6; background: rgba(59, 130, 246, 0.12); color: #93c5fd; }
    html.dark .review-choice-progress:hover:not(:disabled) { border-color: #d4a020; background: rgba(212, 160, 32, 0.12); color: #fcd34d; }
    html.dark .review-choice-done:hover:not(:disabled)     { border-color: #34d399; background: rgba(52, 211, 153, 0.12); color: #6ee7b7; }
</style>

<script>
function serendipityReview() {
    return {
        task: null,
        loading: true,
        submitting: false,
        error: false,
        // מצב מודאל התזכורת
        reminderOpen: false,
        reminderValue: '',
        reminderSaving: false,
        reminderError: '',
        reminderOriginal: null,  // התאריך המקורי (ISO מנורמל) לזיהוי שינוי אמיתי

        statusLabel(s) {
            return { open: 'פתוח', in_progress: 'בתהליך', completed: 'הושלם' }[s] || s;
        },

        async loadNext() {
            this.loading = true;
            this.error = false;
            try {
                const res = await fetch('/api/review/next');
                if (res.status === 401) { window.location = '/login'; return; }
                if (!res.ok) { this.error = true; this.task = null; return; }
                const data = await res.json();
                this.task = data.task;
            } catch (e) {
                console.error(e);
                this.error = true;
                this.task = null;
            } finally {
                this.loading = false;
            }
        },

        async choose(newStatus) {
            if (!this.task || this.submitting) return;
            this.submitting = true;
            try {
                const res = await fetch('/api/review/' + this.task._id, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus }),
                });
                if (res.status === 401) { window.location = '/login'; return; }
                if (!res.ok) { this.error = true; return; }
                // מעבר מיידי למשימה הבאה
                await this.loadNext();
            } catch (e) {
                console.error(e);
                this.error = true;
            } finally {
                this.submitting = false;
            }
        },

        // === תזכורת (שימוש חוזר באותו חוזה של המודאל הראשי) ===

        // השרת מחזיר naive UTC (ללא "Z"); מוסיפים Z כדי לא להיסחף ב-offset המקומי
        parseServerDate(s) {
            if (!s) return null;
            const hasTz = /(Z|[+-]\d{2}:?\d{2})$/.test(s);
            return new Date(hasTz ? s : s + 'Z');
        },

        // המרה לפורמט של <input type="datetime-local"> בזמן מקומי
        toDatetimeLocal(isoStr) {
            const d = this.parseServerDate(isoStr);
            if (!d) return '';
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        },

        // תצוגת מועד התזכורת על הבאדג
        formatReminder(isoStr) {
            const d = this.parseServerDate(isoStr);
            if (!d) return '';
            return d.toLocaleString('he-IL', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        },

        openReminder() {
            if (!this.task) return;
            this.reminderValue = this.task.reminder_date ? this.toDatetimeLocal(this.task.reminder_date) : '';
            // נרמול לאותו פורמט שבו נשלח reminder_date, כדי לזהות שינוי אמיתי
            const orig = this.parseServerDate(this.task.reminder_date);
            this.reminderOriginal = orig ? orig.toISOString() : null;
            this.reminderError = '';
            this.reminderOpen = true;
        },

        closeReminder() {
            // לא לסגור באמצע שמירה - אחרת שגיאה שתתקבל אחרי הסגירה תוסתר
            if (this.reminderSaving) return;
            this.reminderOpen = false;
            this.reminderError = '';
        },

        async clearReminder() {
            await this._saveReminder(null);
        },

        async saveReminder() {
            if (!this.reminderValue) return;
            await this._saveReminder(new Date(this.reminderValue).toISOString());
        },

        // שמירה דרך אותו חוזה כמו המודאל הראשי: PUT /api/tasks/{id}
        async _saveReminder(isoOrNull) {
            if (!this.task || this.reminderSaving) return;
            const targetId = this.task._id;  // נועלים את המשימה שעליה פועלים
            this.reminderSaving = true;
            this.reminderError = '';
            try {
                // מאפסים reminder_sent רק כשהתאריך באמת השתנה, כדי לא "להחיות"
                // תזכורת שכבר נשלחה (עקבי עם מודאל העריכה הראשי).
                const payload = { reminder_date: isoOrNull };
                if (isoOrNull !== this.reminderOriginal) {
                    payload.reminder_sent = false;
                }
                const res = await fetch('/api/tasks/' + targetId, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (res.status === 401) { window.location = '/login'; return; }
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    this.reminderError = err.detail || 'שגיאה בשמירת התזכורת';
                    return;
                }
                const updated = await res.json();
                // מחילים על התצוגה רק אם עדיין מוצגת אותה משימה (מונע תגובה ישנה
                // שתוחל על משימה שהתחלפה בינתיים). השרת עודכן נכון בכל מקרה.
                if (this.task && this.task._id === targetId) {
                    this.task.reminder_date = updated.reminder_date || null;
                }
                this.reminderOpen = false;
            } catch (e) {
                console.error(e);
                this.reminderError = 'שגיאה בשמירת התזכורת';
            } finally {
                this.reminderSaving = false;
            }
        },
    };
}
</script>
{% endblock %}
