{% extends "base.html" %}

{% block title %}ארכיון - TaskFlow{% endblock %}

{% block body %}
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8 fade-in"
      x-data="archiveComponent()">

    <!-- כותרת -->
    <div class="flex justify-between items-center mb-6 md:mb-8 gap-3 flex-wrap">
        <div>
            <h2 class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-sf-text-primary">ארכיון משימות</h2>
            <p class="text-slate-600 dark:text-sf-text-secondary mt-1 text-sm md:text-base">
                משימות שהועברו לארכיון. ניתן לשחזר אותן בחזרה ללוח.
            </p>
        </div>
        <div class="flex items-center gap-2" x-show="selectedIds.length > 0" x-cloak>
            <span class="text-sm text-slate-600 dark:text-sf-text-secondary">
                <span x-text="selectedIds.length"></span> נבחרו
            </span>
            <button
                @click="restoreSelected()"
                :disabled="restoring"
                class="btn btn-primary"
                title="שחזור הנבחרים"
            >
                <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                <span x-show="!restoring">שחזר נבחרים</span>
                <span x-show="restoring">משחזר...</span>
            </button>
            <button @click="clearSelection()" class="btn btn-secondary" title="נקה בחירה">ביטול</button>
        </div>
    </div>

    <!-- מצב טעינה -->
    <div x-show="loading" class="text-center py-12">
        <svg class="w-8 h-8 mx-auto animate-spin text-primary-600 dark:text-sf-primary-light" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <p class="text-slate-500 dark:text-sf-text-secondary mt-2">טוען ארכיון...</p>
    </div>

    <!-- ריק -->
    <div x-show="!loading && tasks.length === 0" x-cloak class="empty-state bg-white dark:bg-sf-bg-card rounded-xl border border-slate-200 dark:border-sf-border">
        <div class="empty-state-icon">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
            </svg>
        </div>
        <h3 class="text-lg font-semibold text-slate-900 dark:text-sf-text-primary mb-2">הארכיון ריק</h3>
        <p class="text-slate-600 dark:text-sf-text-secondary">משימות שתעביר לארכיון מתוך עמודת "הושלם" יופיעו כאן.</p>
    </div>

    <!-- רשימת משימות בארכיון -->
    <div x-show="!loading && tasks.length > 0" x-cloak class="bg-white dark:bg-sf-bg-card rounded-xl border border-slate-200 dark:border-sf-border overflow-hidden">
        <!-- שורת בחירה -->
        <div class="flex items-center gap-3 px-4 py-2 border-b border-slate-200 dark:border-sf-border bg-slate-50 dark:bg-sf-bg-muted">
            <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-600 dark:text-sf-text-secondary">
                <input
                    type="checkbox"
                    :checked="allSelected"
                    @change="toggleSelectAll()"
                    class="w-4 h-4 accent-primary-600 cursor-pointer"
                >
                <span>בחר הכל</span>
            </label>
            <span class="text-xs text-slate-500 dark:text-sf-text-muted">
                סה"כ: <span x-text="tasks.length"></span>
            </span>
        </div>

        <ul class="divide-y divide-slate-100 dark:divide-sf-border">
            <template x-for="task in tasks" :key="task._id">
                <li class="px-4 py-3 hover:bg-slate-50 dark:hover:bg-sf-bg-hover transition-colors flex items-start gap-3">
                    <input
                        type="checkbox"
                        :checked="isSelected(task._id)"
                        @change="toggleSelection(task._id)"
                        class="flex-shrink-0 w-4 h-4 mt-1 accent-primary-600 cursor-pointer"
                        aria-label="בחר משימה"
                    >

                    <div class="flex-1 min-w-0">
                        <a :href="`/tasks/${task._id}`" class="font-medium text-slate-900 dark:text-sf-text-primary hover:text-primary-700 dark:hover:text-sf-primary-light break-words" x-text="task.title"></a>

                        <div class="flex flex-wrap gap-1.5 mt-1.5 text-xs">
                            <!-- שם פרויקט -->
                            <span x-show="task.project_name" class="text-slate-500 dark:text-sf-text-secondary inline-flex items-center">
                                <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2"/>
                                </svg>
                                <span x-text="task.project_name"></span>
                            </span>

                            <!-- שם לקוח -->
                            <span x-show="task.client_name" class="inline-flex items-center text-slate-600 dark:text-sf-text-secondary">
                                <span class="w-2 h-2 rounded-full ml-1.5" :style="`background-color: ${task.client_color || '#94A3B8'}`"></span>
                                <span x-text="task.client_name"></span>
                            </span>

                            <!-- תאריך ארכוב -->
                            <span x-show="task.archived_at" class="text-slate-500 dark:text-sf-text-muted">
                                הועבר לארכיון: <span x-text="formatDate(task.archived_at)"></span>
                            </span>

                            <!-- תגיות -->
                            <template x-for="tag in (task.tag_details || []).slice(0, 3)" :key="tag._id">
                                <span
                                    class="px-2 py-0.5 rounded-full font-medium"
                                    :style="`background-color: ${tag.color}20; color: ${tag.color}; border: 1px solid ${tag.color}40`"
                                    x-text="tag.name"
                                ></span>
                            </template>
                        </div>
                    </div>

                    <button
                        @click="restoreSingle(task._id)"
                        :disabled="restoring"
                        class="flex-shrink-0 text-slate-500 dark:text-sf-text-secondary hover:text-primary-700 dark:hover:text-sf-primary-light p-2 rounded hover:bg-white dark:hover:bg-sf-bg-card transition-colors"
                        title="שחזר משימה"
                        aria-label="שחזר"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                    </button>
                </li>
            </template>
        </ul>
    </div>
</main>

<script>
function archiveComponent() {
    return {
        tasks: [],
        loading: true,
        selectedIds: [],
        restoring: false,

        async init() {
            await this.loadTasks();
        },

        async loadTasks() {
            this.loading = true;
            try {
                const res = await fetch('/api/tasks?archived=true');
                if (res.status === 401) { window.location = '/login'; return; }
                if (res.ok) {
                    const data = await res.json();
                    // מיון - האחרונים שהועברו לארכיון בראש
                    this.tasks = data.sort((a, b) => {
                        const da = a.archived_at ? new Date(a.archived_at).getTime() : 0;
                        const db = b.archived_at ? new Date(b.archived_at).getTime() : 0;
                        return db - da;
                    });
                }
            } catch (e) {
                console.error(e);
            } finally {
                this.loading = false;
            }
        },

        get allSelected() {
            return this.tasks.length > 0 && this.selectedIds.length === this.tasks.length;
        },

        isSelected(id) {
            return this.selectedIds.includes(id);
        },

        toggleSelection(id) {
            const idx = this.selectedIds.indexOf(id);
            if (idx >= 0) this.selectedIds.splice(idx, 1);
            else this.selectedIds.push(id);
        },

        toggleSelectAll() {
            if (this.allSelected) {
                this.selectedIds = [];
            } else {
                this.selectedIds = this.tasks.map(t => t._id);
            }
        },

        clearSelection() {
            this.selectedIds = [];
        },

        formatDate(iso) {
            if (!iso) return '';
            try {
                const d = new Date(iso);
                return d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' });
            } catch (e) { return ''; }
        },

        async _sendUnarchive(ids) {
            const res = await fetch('/api/tasks/unarchive', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task_ids: ids }),
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || 'שגיאה בשחזור');
            }
        },

        async restoreSelected() {
            if (this.selectedIds.length === 0 || this.restoring) return;
            const ids = [...this.selectedIds];
            const ok = confirm(`לשחזר ${ids.length} משימות מהארכיון?`);
            if (!ok) return;
            this.restoring = true;
            try {
                await this._sendUnarchive(ids);
                this.selectedIds = [];
                await this.loadTasks();
            } catch (e) {
                alert(e.message || 'שגיאת רשת');
            } finally {
                this.restoring = false;
            }
        },

        async restoreSingle(id) {
            if (this.restoring) return;
            this.restoring = true;
            try {
                await this._sendUnarchive([id]);
                this.selectedIds = this.selectedIds.filter(x => x !== id);
                await this.loadTasks();
            } catch (e) {
                alert(e.message || 'שגיאת רשת');
            } finally {
                this.restoring = false;
            }
        },
    };
}
</script>

<style>
    [x-cloak] { display: none !important; }
</style>
{% endblock %}
