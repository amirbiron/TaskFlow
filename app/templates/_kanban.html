{# רכיב Kanban משותף - נכלל בעמוד פרויקט ובעמוד משימות גלובלי #}

<!-- מצב טעינה -->
<div x-show="loading" class="text-center py-12">
    <svg class="w-8 h-8 mx-auto animate-spin text-primary-600 dark:text-sf-primary-light" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <p class="text-slate-500 dark:text-sf-text-secondary mt-2">טוען משימות...</p>
</div>

<!-- Empty state -->
<div x-show="!loading && tasks.length === 0" class="empty-state bg-white dark:bg-sf-bg-card rounded-xl border border-slate-200 dark:border-sf-border">
    <div class="empty-state-icon">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
    </div>
    <h3 class="text-lg font-semibold text-slate-900 dark:text-sf-text-primary mb-2">אין עדיין משימות</h3>
    <p class="text-slate-600 dark:text-sf-text-secondary mb-4">צור את המשימה הראשונה שלך</p>
    <button @click="openCreateModal('open')" class="btn btn-primary">
        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        משימה חדשה
    </button>
</div>

<!-- לוח Kanban -->
<div x-show="!loading && tasks.length > 0" class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <template x-for="col in statusColumns" :key="col.id">
        <div class="bg-slate-100 dark:bg-sf-bg-muted rounded-xl p-3 flex flex-col">
            <div class="flex items-center justify-between mb-3 px-1 gap-2">
                <h3 class="font-bold text-slate-700 dark:text-sf-text-primary flex items-center min-w-0">
                    <span x-text="col.label"></span>
                    <span class="text-xs text-slate-500 dark:text-sf-text-secondary mr-2 bg-white dark:bg-sf-bg-card px-2 py-0.5 rounded-full" x-text="tasksByStatus(col.id).length"></span>
                    <!-- ספירת בחירה (רק בעמודת הושלם, במצב בחירה) -->
                    <span
                        x-show="col.id === 'completed' && selectionMode"
                        x-cloak
                        class="text-xs text-primary-700 dark:text-sf-primary-light mr-2 bg-primary-50 dark:bg-sf-primary/15 px-2 py-0.5 rounded-full"
                    >
                        <span x-text="selectedTaskIds.length"></span> נבחרו
                    </span>
                </h3>
                <div class="flex items-center gap-1 flex-shrink-0">
                    <!-- כפתורי מצב בחירה - רק בעמודת "הושלם" -->
                    <template x-if="col.id === 'completed' && tasksByStatus(col.id).length > 0 && !selectionMode">
                        <button
                            @click="enterSelectionMode()"
                            class="text-slate-400 dark:text-sf-text-muted hover:text-slate-700 dark:hover:text-sf-text-primary p-1 rounded hover:bg-white dark:hover:bg-sf-bg-card transition-colors"
                            title="בחירה מרובה לארכוב"
                            aria-label="בחירה מרובה"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                            </svg>
                        </button>
                    </template>

                    <!-- במצב בחירה: כפתור "סמן הכל", "ארכב נבחרים", "ביטול" -->
                    <template x-if="col.id === 'completed' && selectionMode">
                        <button
                            @click="selectAllCompleted()"
                            class="text-slate-500 dark:text-sf-text-secondary hover:text-slate-700 dark:hover:text-sf-text-primary p-1 rounded hover:bg-white dark:hover:bg-sf-bg-card transition-colors text-xs px-2"
                            title="סמן את כל המשימות"
                        >
                            סמן הכל
                        </button>
                    </template>
                    <template x-if="col.id === 'completed' && selectionMode">
                        <button
                            @click="archiveSelected()"
                            :disabled="selectedTaskIds.length === 0 || archiving"
                            class="text-primary-600 dark:text-sf-primary-light hover:text-primary-800 disabled:opacity-40 disabled:cursor-not-allowed p-1 rounded hover:bg-white dark:hover:bg-sf-bg-card transition-colors"
                            title="העבר נבחרים לארכיון"
                            aria-label="העבר לארכיון"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                            </svg>
                        </button>
                    </template>
                    <template x-if="col.id === 'completed' && selectionMode">
                        <button
                            @click="exitSelectionMode()"
                            class="text-slate-400 dark:text-sf-text-muted hover:text-slate-700 dark:hover:text-sf-text-primary p-1 rounded hover:bg-white dark:hover:bg-sf-bg-card transition-colors"
                            title="ביטול בחירה"
                            aria-label="ביטול"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </template>

                    <!-- כפתור משימה חדשה (לא במצב בחירה) -->
                    <button
                        x-show="!(col.id === 'completed' && selectionMode)"
                        @click="openCreateModal(col.id)"
                        class="text-slate-400 dark:text-sf-text-muted hover:text-slate-700 dark:hover:text-sf-text-primary p-1 rounded hover:bg-white dark:hover:bg-sf-bg-card transition-colors"
                        title="משימה חדשה"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div
                :id="`column-${col.id}`"
                :data-status="col.id"
                class="kanban-column flex-1 min-h-[100px] space-y-2"
            >
                <template x-for="task in tasksByStatus(col.id)" :key="task._id">
                    <div
                        :data-task-id="task._id"
                        @click="navigateToTask(task._id, task)"
                        class="kanban-card bg-white dark:bg-sf-bg-card rounded-lg p-3 shadow-sm border border-slate-200 dark:border-sf-border cursor-pointer hover:shadow-md transition-shadow"
                        :class="[
                            task.status === 'completed' ? 'opacity-60' : '',
                            (selectionMode && col.id === 'completed' && isTaskSelected(task._id)) ? 'ring-2 ring-primary-500 dark:ring-sf-primary-light !opacity-100' : ''
                        ]"
                    >
                        <!-- כותרת + checkbox/ידית גרירה + עריכה מהירה -->
                        <div class="flex items-start gap-2 mb-2">
                            <!-- Checkbox בחירה (במצב בחירה, רק לעמודת "הושלם") -->
                            <template x-if="selectionMode && col.id === 'completed'">
                                <input
                                    type="checkbox"
                                    :checked="isTaskSelected(task._id)"
                                    @click.stop="toggleTaskSelection(task._id)"
                                    class="flex-shrink-0 w-4 h-4 mt-0.5 accent-primary-600 cursor-pointer"
                                    aria-label="בחר משימה"
                                >
                            </template>

                            <!-- ידית גרירה: רק כאן Sortable תופס את ההצבעה -->
                            <button
                                x-show="!(selectionMode && col.id === 'completed')"
                                type="button"
                                class="drag-handle flex-shrink-0 -m-1 p-1 rounded text-slate-400 dark:text-sf-text-muted hover:bg-slate-100 dark:hover:bg-sf-bg-hover hover:text-slate-700 dark:hover:text-sf-text-primary"
                                @click.stop
                                aria-label="גרור משימה"
                            >
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                    <circle cx="9" cy="6" r="1.6"/>
                                    <circle cx="15" cy="6" r="1.6"/>
                                    <circle cx="9" cy="12" r="1.6"/>
                                    <circle cx="15" cy="12" r="1.6"/>
                                    <circle cx="9" cy="18" r="1.6"/>
                                    <circle cx="15" cy="18" r="1.6"/>
                                </svg>
                            </button>
                            <div class="font-medium text-slate-900 dark:text-sf-text-primary leading-snug flex-1 min-w-0" x-text="task.title"></div>
                            <!-- עריכה מהירה (לא מנווט לעמוד) -->
                            <button
                                type="button"
                                @click.stop="openEditModal(task)"
                                class="flex-shrink-0 -m-1 p-1 rounded text-slate-400 dark:text-sf-text-muted hover:bg-slate-100 dark:hover:bg-sf-bg-hover hover:text-slate-700 dark:hover:text-sf-text-primary"
                                aria-label="עריכה מהירה"
                                title="עריכה מהירה"
                            >
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                </svg>
                            </button>
                        </div>

                        <!-- תגיות (עד 3 + מספר נוספים) -->
                        <div x-show="task.tag_details && task.tag_details.length > 0" class="flex flex-wrap gap-1 mb-2">
                            <template x-for="tag in visibleTaskTags(task)" :key="tag._id">
                                <span
                                    class="px-2 py-0.5 rounded-full text-xs font-medium"
                                    :style="`background-color: ${tag.color}20; color: ${tag.color}; border: 1px solid ${tag.color}40`"
                                    x-text="tag.name"
                                ></span>
                            </template>
                            <span x-show="hiddenTaskTagsCount(task) > 0" class="px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 dark:bg-sf-bg-muted text-slate-600 dark:text-sf-text-secondary">
                                +<span x-text="hiddenTaskTagsCount(task)"></span>
                            </span>
                        </div>

                        <!-- מטא-נתונים -->
                        <div class="flex flex-wrap gap-1.5 text-xs">
                            <!-- עדיפות -->
                            <span class="px-2 py-0.5 rounded-full" :class="priorityClass(task.priority)" x-text="priorityLabel(task.priority)"></span>

                            <!-- תאריך יעד -->
                            <span
                                x-show="task.due_date"
                                class="px-2 py-0.5 rounded-full inline-flex items-center"
                                :class="dueDateBadgeClass(task.due_date, task.status)"
                            >
                                <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                                <span x-text="formatDate(task.due_date)"></span>
                            </span>

                            <!-- תת-משימות -->
                            <span x-show="task.subtasks && task.subtasks.length > 0" class="bg-slate-100 dark:bg-sf-bg-muted text-slate-600 dark:text-sf-text-secondary px-2 py-0.5 rounded-full inline-flex items-center">
                                <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                                </svg>
                                <span x-text="completedSubtasksCount(task)"></span>/<span x-text="task.subtasks.length"></span>
                            </span>

                            <!-- קישורים -->
                            <span x-show="task.links && task.links.length > 0" class="bg-slate-100 dark:bg-sf-bg-muted text-slate-600 dark:text-sf-text-secondary px-2 py-0.5 rounded-full inline-flex items-center">
                                <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                                </svg>
                                <span x-text="task.links.length"></span>
                            </span>

                            <!-- מספר הערות -->
                            <span x-show="task.comments_count > 0" class="bg-slate-100 dark:bg-sf-bg-muted text-slate-600 dark:text-sf-text-secondary px-2 py-0.5 rounded-full inline-flex items-center" :title="task.comments_count + ' הערות'">
                                <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                                </svg>
                                <span x-text="task.comments_count"></span>
                            </span>
                        </div>

                        <!-- שם פרויקט (גלובלי) -->
                        <div x-show="showProjectName && task.project_name" class="mt-2 text-xs text-slate-500 dark:text-sf-text-secondary truncate">
                            <svg class="w-3 h-3 ml-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2"/>
                            </svg>
                            <span x-text="task.project_name"></span>
                        </div>

                        <!-- שם לקוח -->
                        <div x-show="task.client_name" class="mt-2 text-xs flex items-center">
                            <span class="w-2 h-2 rounded-full ml-1.5" :style="`background-color: ${task.client_color || '#94A3B8'}`"></span>
                            <span class="text-slate-600 dark:text-sf-text-secondary truncate" x-text="task.client_name"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>
</div>

{% include "_task_form_modal.html" %}
