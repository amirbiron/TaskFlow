<!-- מודאל יצירה/עריכה של משימה -->
<div x-show="modalOpen" x-cloak @click.self="closeModal()" class="modal-backdrop" x-transition.opacity>
    <div class="modal-content slide-up max-w-lg">
        <div class="flex justify-between items-center p-6 border-b border-slate-200 dark:border-slate-700 sticky top-0 bg-white dark:bg-slate-800 z-10">
            <h3 class="text-xl font-bold text-slate-900 dark:text-slate-100">
                <span x-show="modalMode === 'create'">משימה חדשה</span>
                <span x-show="modalMode === 'edit'">עריכת משימה</span>
            </h3>
            <button @click="closeModal()" class="text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <form @submit.prevent="saveTask()" class="p-6 space-y-4">
            <div>
                <label class="form-label">כותרת <span class="text-red-500 dark:text-red-400">*</span></label>
                <input type="text" x-model="formData.title" class="form-input" required maxlength="300" autofocus>
            </div>

            <div>
                <label class="form-label">תיאור</label>
                <textarea x-model="formData.description" class="form-input" rows="3"></textarea>
            </div>

            <div x-show="!projectId">
                <label class="form-label">פרויקט <span class="text-red-500 dark:text-red-400">*</span></label>
                <select x-model="formData.project_id" class="form-input" required>
                    <option value="">— בחר פרויקט —</option>
                    <template x-for="p in projectOptions" :key="p._id">
                        <option :value="p._id" x-text="p.name"></option>
                    </template>
                </select>
            </div>

            <div>
                <label class="form-label">לקוח</label>
                <select x-model="formData.client_id" class="form-input">
                    <option value="">— ללא לקוח (יורש מהפרויקט) —</option>
                    <template x-for="c in clientOptions" :key="c._id">
                        <option :value="c._id" x-text="c.name"></option>
                    </template>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="form-label">סטטוס</label>
                    <select x-model="formData.status" class="form-input">
                        <option value="open">פתוח</option>
                        <option value="in_progress">בתהליך</option>
                        <option value="completed">הושלם</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">עדיפות</label>
                    <select x-model="formData.priority" class="form-input">
                        <option value="low">נמוכה</option>
                        <option value="normal">רגילה</option>
                        <option value="high">גבוהה</option>
                        <option value="urgent">דחוף</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="form-label">תאריך יעד</label>
                <input type="date" x-model="formData.due_date" class="form-input">
            </div>

            <!-- תגיות -->
            <div>
                <label class="form-label">תגיות</label>
                <div class="space-y-2">
                    <!-- תגיות שנבחרו -->
                    <div class="flex flex-wrap gap-1.5" x-show="selectedTagDetails.length > 0">
                        <template x-for="tag in selectedTagDetails" :key="tag._id">
                            <span
                                class="px-2 py-1 rounded-full text-xs font-medium inline-flex items-center gap-1"
                                :style="`background-color: ${tag.color}20; color: ${tag.color}; border: 1px solid ${tag.color}40`"
                            >
                                <span x-text="tag.name"></span>
                                <button type="button" @click="removeTag(tag._id)" class="hover:opacity-70">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                    </svg>
                                </button>
                            </span>
                        </template>
                    </div>

                    <!-- חיפוש/הוספת תגית -->
                    <div class="relative">
                        <input
                            type="text"
                            x-model="tagSearchQuery"
                            @focus="tagPickerOpen = true"
                            @keydown.enter.prevent="canCreateNewTag ? createAndAddTag() : null"
                            placeholder="חפש או צור תגית..."
                            class="form-input"
                        >

                        <!-- רשימה נפתחת -->
                        <div
                            x-show="tagPickerOpen && (availableTags.length > 0 || canCreateNewTag)"
                            x-cloak
                            @click.outside="tagPickerOpen = false"
                            class="absolute z-20 w-full mt-1 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg max-h-48 overflow-y-auto"
                        >
                            <!-- תגיות קיימות -->
                            <template x-for="tag in availableTags" :key="tag._id">
                                <button
                                    type="button"
                                    @click="addTag(tag._id)"
                                    class="w-full text-right px-3 py-2 hover:bg-slate-50 dark:hover:bg-slate-800/60 flex items-center gap-2"
                                >
                                    <span class="w-3 h-3 rounded-full" :style="`background-color: ${tag.color}`"></span>
                                    <span x-text="tag.name"></span>
                                </button>
                            </template>

                            <!-- אפשרות יצירה -->
                            <button
                                type="button"
                                x-show="canCreateNewTag"
                                @click="createAndAddTag()"
                                :disabled="creatingTag"
                                class="w-full text-right px-3 py-2 hover:bg-slate-50 dark:hover:bg-slate-800/60 border-t border-slate-100 dark:border-slate-800 text-primary-600 dark:text-primary-400 flex items-center gap-2"
                            >
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                </svg>
                                <span>צור תגית "<span x-text="tagSearchQuery"></span>"</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- תת-משימות -->
            <div>
                <label class="form-label">תת-משימות</label>
                <div class="space-y-2">
                    <template x-for="(subtask, idx) in formData.subtasks" :key="subtask.id">
                        <div class="flex items-center gap-2 bg-slate-50 dark:bg-slate-900/60 px-3 py-2 rounded">
                            <input
                                type="checkbox"
                                :checked="subtask.completed"
                                @change="toggleSubtask(idx)"
                                class="w-4 h-4 text-primary-600 dark:text-primary-400 rounded"
                            >
                            <span class="flex-1 text-sm" :class="subtask.completed ? 'line-through text-slate-400 dark:text-slate-500' : ''" x-text="subtask.title"></span>
                            <button type="button" @click="removeSubtask(idx)" class="text-red-500 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                    </template>

                    <div class="flex gap-2">
                        <input
                            type="text"
                            x-model="newSubtask"
                            @keydown.enter.prevent="addSubtask()"
                            placeholder="הוסף תת-משימה..."
                            class="form-input flex-1"
                            maxlength="300"
                        >
                        <button type="button" @click="addSubtask()" class="btn btn-secondary">הוסף</button>
                    </div>
                </div>
            </div>

            <!-- קישורים -->
            <div>
                <label class="form-label">קישורים</label>
                <div class="flex gap-2 mb-2">
                    <input
                        type="url"
                        x-model="newLink"
                        @keydown.enter.prevent="addLink()"
                        placeholder="https://..."
                        class="form-input flex-1"
                    >
                    <button type="button" @click="addLink()" class="btn btn-secondary">הוסף</button>
                </div>
                <div class="space-y-1" x-show="formData.links.length > 0">
                    <template x-for="(link, idx) in formData.links" :key="idx">
                        <div class="flex items-center gap-2 text-sm bg-slate-50 dark:bg-slate-900/60 px-3 py-2 rounded">
                            <a :href="link" target="_blank" class="text-primary-600 dark:text-primary-400 hover:underline truncate flex-1" x-text="link"></a>
                            <button type="button" @click="removeLink(idx)" class="text-red-500 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="error" class="bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900/60 text-red-700 dark:text-red-300 px-3 py-2 rounded-lg text-sm" x-text="error"></div>

            <div class="flex gap-2 pt-2">
                <button type="button" @click="closeModal()" class="btn btn-secondary flex-1">ביטול</button>
                <template x-if="modalMode === 'edit'">
                    <button type="button" @click="confirmDelete({ _id: currentTaskId, title: formData.title })" class="btn btn-danger">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </button>
                </template>
                <button type="submit" class="btn btn-primary flex-1" :disabled="saving">
                    <span x-show="!saving">שמור</span>
                    <span x-show="saving">שומר...</span>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- אישור מחיקה -->
<div x-show="deleteConfirmOpen" x-cloak @click.self="deleteConfirmOpen = false" class="modal-backdrop" x-transition.opacity>
    <div class="modal-content slide-up max-w-md">
        <div class="p-6">
            <div class="flex items-start mb-4">
                <div class="w-10 h-10 bg-red-100 dark:bg-red-950/50 rounded-full flex items-center justify-center ml-3 flex-shrink-0">
                    <svg class="w-6 h-6 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                </div>
                <div>
                    <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100">מחיקת משימה</h3>
                    <p class="text-slate-600 dark:text-slate-400 mt-1">
                        למחוק את המשימה "<span x-text="formData.title" class="font-semibold"></span>"?
                    </p>
                </div>
            </div>
            <div class="flex gap-2">
                <button @click="deleteConfirmOpen = false" class="btn btn-secondary flex-1">ביטול</button>
                <button @click="deleteTask()" class="btn btn-danger flex-1" :disabled="saving">
                    <span x-show="!saving">מחק</span>
                    <span x-show="saving">מוחק...</span>
                </button>
            </div>
        </div>
    </div>
</div>
