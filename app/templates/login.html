{% extends "base.html" %}

{% block title %}התחברות - TaskFlow{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-slate-100 to-blue-100 dark:from-sf-bg-deep dark:to-sf-bg-card">
    <!-- כפתור Dark Mode פינתי במסך הלוגין -->
    <button type="button"
            onclick="window.toggleTheme()"
            class="theme-toggle fixed top-4 left-4 text-slate-600 dark:text-sf-text-secondary p-2 rounded-lg bg-white/70 dark:bg-sf-bg-card/70 backdrop-blur hover:bg-white dark:hover:bg-sf-bg-hover shadow-sm"
            title="החלפת ערכת נושא"
            aria-label="החלפת ערכת נושא">
        <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
    </button>
    <div class="max-w-md w-full">
        <!-- לוגו / כותרת -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-primary-600 dark:bg-sf-primary rounded-2xl shadow-lg mb-4">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-sf-text-primary">TaskFlow</h1>
            <p class="text-slate-600 dark:text-sf-text-secondary mt-2">ניהול פרויקטים, משימות ולקוחות</p>
        </div>

        <!-- טופס -->
        <div class="bg-white dark:bg-sf-bg-card rounded-2xl shadow-xl p-8 dark:border dark:border-sf-border">
            <h2 class="text-xl font-semibold mb-6 text-center text-slate-900 dark:text-sf-text-primary">התחברות</h2>

            {% if error %}
            <div class="mb-4 p-3 bg-red-50 dark:bg-sf-red/20 border border-red-200 dark:border-sf-red/40 text-red-700 dark:text-sf-red rounded-lg text-sm text-center">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 dark:text-sf-text-secondary mb-2">
                        סיסמה
                    </label>
                    <input
                        type="password"
                        name="password"
                        id="password"
                        required
                        autofocus
                        class="form-input text-lg"
                        placeholder="הזן סיסמה"
                    />
                </div>

                <button
                    type="submit"
                    class="w-full bg-primary-600 dark:bg-sf-primary hover:bg-primary-700 dark:hover:bg-sf-primary-hover text-white font-medium py-3 px-4 rounded-lg transition-colors shadow-md hover:shadow-lg"
                >
                    כניסה
                </button>
            </form>
        </div>

        <p class="text-center text-slate-500 dark:text-sf-text-muted text-sm mt-6">
            מערכת אישית · כל הזכויות שמורות
        </p>
    </div>
</div>
{% endblock %}
