{% extends "base.html" %}

{% block title %}התחברות - TaskFlow{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-slate-100 to-blue-100 dark:from-slate-950 dark:to-slate-900">
    <div class="max-w-md w-full">
        <!-- לוגו / כותרת -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-primary-600 rounded-2xl shadow-lg mb-4">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100">TaskFlow</h1>
            <p class="text-slate-600 dark:text-slate-400 mt-2">ניהול פרויקטים, משימות ולקוחות</p>
        </div>

        <!-- טופס -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8">
            <h2 class="text-xl font-semibold mb-6 text-center">התחברות</h2>

            {% if error %}
            <div class="mb-4 p-3 bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900/60 text-red-700 dark:text-red-300 rounded-lg text-sm text-center">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                        סיסמה
                    </label>
                    <input
                        type="password"
                        name="password"
                        id="password"
                        required
                        autofocus
                        class="form-input text-lg"
                        placeholder="הזן סיסמה"
                    />
                </div>

                <button
                    type="submit"
                    class="w-full bg-primary-600 hover:bg-primary-700 dark:hover:bg-primary-500 text-white font-medium py-3 px-4 rounded-lg transition-colors shadow-md hover:shadow-lg"
                >
                    כניסה
                </button>
            </form>
        </div>

        <p class="text-center text-slate-500 dark:text-slate-400 text-sm mt-6">
            מערכת אישית · כל הזכויות שמורות
        </p>
    </div>
</div>
{% endblock %}
