{% extends "base.html" %}

{% block title %}פרויקטים - TaskFlow{% endblock %}

{% block body %}
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8 fade-in" x-data="projectsManager()" x-init="init()">

    <!-- כותרת + כפתור הוספה -->
    <div class="flex justify-between items-center mb-6 md:mb-8">
        <div>
            <h2 class="text-2xl md:text-3xl font-bold text-slate-900">פרויקטים</h2>
            <p class="text-slate-600 mt-1 text-sm md:text-base" x-show="projects.length > 0">
                <span x-text="projects.length"></span> פרויקטים מוצגים
            </p>
        </div>
        <button @click="openCreateModal()" class="btn btn-primary">
            <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            פרויקט חדש
        </button>
    </div>

    <!-- כפתור הצגת פרויקטים לא פעילים -->
    <div class="mb-6 flex items-center gap-3">
        <label class="flex items-center cursor-pointer select-none">
            <input
                type="checkbox"
                x-model="includeInactive"
                @change="loadProjects()"
                class="w-4 h-4 text-primary-600 rounded ml-2"
            />
            <span class="text-sm text-slate-700">הצג גם פרויקטים שהושלמו או בארכיון</span>
        </label>
    </div>

    <!-- חיפוש -->
    <div class="mb-6" x-show="projects.length > 0">
        <div class="relative">
            <svg class="w-5 h-5 absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input
                type="text"
                x-model="searchQuery"
                placeholder="חיפוש פרויקט..."
                class="form-input pr-10"
            />
        </div>
    </div>

    <!-- מצב טעינה -->
    <div x-show="loading" class="text-center py-12">
        <svg class="w-8 h-8 mx-auto animate-spin text-primary-600" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-slate-500 mt-2">טוען...</p>
    </div>

    <!-- Empty state -->
    <div x-show="!loading && projects.length === 0" class="empty-state bg-white rounded-xl border border-slate-200">
        <div class="empty-state-icon">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
            </svg>
        </div>
        <h3 class="text-lg font-semibold text-slate-900 mb-2">אין פרויקטים פעילים</h3>
        <p class="text-slate-600 mb-4">צור את הפרויקט הראשון שלך כדי להתחיל</p>
        <button @click="openCreateModal()" class="btn btn-primary">
            <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            צור פרויקט ראשון
        </button>
    </div>

    <!-- רשימת פרויקטים -->
    <div x-show="!loading && filteredProjects.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <template x-for="project in filteredProjects" :key="project._id">
            <a :href="`/projects/${project._id}`" class="client-card slide-up block no-underline text-inherit">
                <!-- פס צבע - מהלקוח או ברירת מחדל -->
                <div class="client-card-color-bar" :style="`background-color: ${project.client_color || '#94A3B8'}`"></div>

                <div class="pr-3">
                    <!-- שם + סטטוס -->
                    <div class="flex items-start justify-between gap-2 mb-2">
                        <h3 class="text-lg font-bold text-slate-900 truncate" x-text="project.name"></h3>
                        <span
                            class="text-xs px-2 py-1 rounded-full whitespace-nowrap flex-shrink-0"
                            :class="statusBadgeClass(project.status)"
                            x-text="statusLabel(project.status)"
                        ></span>
                    </div>

                    <!-- לקוח -->
                    <div class="text-sm text-slate-600 mb-2" x-show="project.client_name">
                        <svg class="w-4 h-4 ml-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <span x-text="project.client_name"></span>
                    </div>
                    <div class="text-sm text-slate-400 italic mb-2" x-show="!project.client_name">
                        ללא לקוח
                    </div>

                    <!-- תיאור -->
                    <p
                        class="text-sm text-slate-600 mb-3 line-clamp-2"
                        x-show="project.description"
                        x-text="project.description"
                    ></p>

                    <!-- סטטיסטיקות משימות -->
                    <div class="flex gap-2 text-xs">
                        <span class="bg-amber-50 text-amber-700 px-2 py-1 rounded-full" x-show="project.open_tasks_count > 0">
                            <span x-text="project.open_tasks_count"></span> משימות פתוחות
                        </span>
                        <span class="bg-green-50 text-green-700 px-2 py-1 rounded-full" x-show="project.completed_tasks_count > 0">
                            <span x-text="project.completed_tasks_count"></span> הושלמו
                        </span>
                        <span class="bg-slate-100 text-slate-500 px-2 py-1 rounded-full" x-show="project.open_tasks_count === 0 && project.completed_tasks_count === 0">
                            ללא משימות
                        </span>
                    </div>
                </div>
            </a>
        </template>
    </div>

    <!-- הודעה כשאין תוצאות בחיפוש -->
    <div x-show="!loading && projects.length > 0 && filteredProjects.length === 0" class="text-center py-12 text-slate-500">
        לא נמצאו פרויקטים התואמים לחיפוש
    </div>

    <!-- מודאל יצירה -->
    <div x-show="modalOpen" x-cloak @click.self="closeModal()" class="modal-backdrop" x-transition.opacity>
        <div class="modal-content slide-up">
            <div class="flex justify-between items-center p-6 border-b border-slate-200">
                <h3 class="text-xl font-bold text-slate-900">פרויקט חדש</h3>
                <button @click="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <form @submit.prevent="saveProject()" class="p-6 space-y-4">
                <div>
                    <label class="form-label">שם הפרויקט <span class="text-red-500">*</span></label>
                    <input type="text" x-model="formData.name" class="form-input" required maxlength="200" autofocus>
                </div>

                <div>
                    <label class="form-label">תיאור</label>
                    <textarea x-model="formData.description" class="form-input" rows="3"></textarea>
                </div>

                <div>
                    <label class="form-label">לקוח</label>
                    <select x-model="formData.client_id" class="form-input">
                        <option value="">— ללא לקוח —</option>
                        <template x-for="client in clientOptions" :key="client._id">
                            <option :value="client._id" x-text="client.name"></option>
                        </template>
                    </select>
                </div>

                <div>
                    <label class="form-label">סטטוס</label>
                    <select x-model="formData.status" class="form-input">
                        <option value="active">פעיל</option>
                        <option value="pending">בהמתנה</option>
                        <option value="completed">הושלם</option>
                        <option value="archived">בארכיון</option>
                    </select>
                </div>

                <div x-show="error" class="bg-red-50 border border-red-200 text-red-700 px-3 py-2 rounded-lg text-sm" x-text="error"></div>

                <div class="flex gap-2 pt-2">
                    <button type="button" @click="closeModal()" class="btn btn-secondary flex-1">ביטול</button>
                    <button type="submit" class="btn btn-primary flex-1" :disabled="saving">
                        <span x-show="!saving">שמור</span>
                        <span x-show="saving">שומר...</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

</main>

<script>
function projectsManager() {
    return {
        projects: [],
        clientOptions: [],
        loading: true,
        includeInactive: false,
        searchQuery: '',
        modalOpen: false,
        saving: false,
        error: null,
        formData: {
            name: '',
            description: '',
            client_id: '',
            status: 'active',
        },

        async init() {
            await Promise.all([this.loadProjects(), this.loadClients()]);
        },

        get filteredProjects() {
            if (!this.searchQuery.trim()) return this.projects;
            const q = this.searchQuery.toLowerCase();
            return this.projects.filter(p =>
                (p.name || '').toLowerCase().includes(q) ||
                (p.description || '').toLowerCase().includes(q) ||
                (p.client_name || '').toLowerCase().includes(q)
            );
        },

        statusLabel(s) {
            return {
                active: 'פעיל',
                pending: 'בהמתנה',
                completed: 'הושלם',
                archived: 'בארכיון',
            }[s] || s;
        },

        statusBadgeClass(s) {
            return {
                active: 'bg-green-50 text-green-700',
                pending: 'bg-amber-50 text-amber-700',
                completed: 'bg-blue-50 text-blue-700',
                archived: 'bg-slate-100 text-slate-600',
            }[s] || 'bg-slate-100 text-slate-600';
        },

        async loadProjects() {
            this.loading = true;
            try {
                const res = await fetch(`/api/projects?include_inactive=${this.includeInactive}`);
                if (res.status === 401) { window.location = '/login'; return; }
                this.projects = await res.json();
            } catch (e) {
                console.error('שגיאה בטעינת פרויקטים:', e);
            } finally {
                this.loading = false;
            }
        },

        async loadClients() {
            try {
                const res = await fetch('/api/clients/select-options');
                if (res.ok) {
                    this.clientOptions = await res.json();
                }
            } catch (e) {
                console.error('שגיאה בטעינת לקוחות:', e);
            }
        },

        resetForm() {
            this.formData = {
                name: '',
                description: '',
                client_id: '',
                status: 'active',
            };
            this.error = null;
        },

        openCreateModal() {
            this.resetForm();
            this.modalOpen = true;
        },

        closeModal() {
            this.modalOpen = false;
            this.error = null;
            setTimeout(() => this.resetForm(), 200);
        },

        async saveProject() {
            this.saving = true;
            this.error = null;

            try {
                const payload = { ...this.formData };
                if (!payload.client_id) payload.client_id = null;
                if (!payload.description || !payload.description.trim()) payload.description = null;

                const res = await fetch('/api/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    this.error = err.detail || 'שגיאה בשמירה';
                    return;
                }

                const newProject = await res.json();
                this.closeModal();
                // הפניה לעמוד הפרויקט החדש
                window.location = `/projects/${newProject._id}`;
            } catch (e) {
                this.error = 'שגיאת רשת';
                console.error(e);
            } finally {
                this.saving = false;
            }
        },
    };
}
</script>

<style>
    [x-cloak] { display: none !important; }
    .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    a.no-underline { text-decoration: none; color: inherit; }
</style>
{% endblock %}
